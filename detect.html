<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>即時骰子辨識系統 - Web 版</title>
    <link rel="stylesheet" href="style.css">
    <style>
        .container { text-align: center; padding: 20px; }
        .canvas-container { position: relative; display: inline-block; }
        #canvasOutput { border: 2px solid #333; border-radius: 8px; max-width: 100%; }
        .status-panel { margin-top: 15px; font-family: 'Noto Sans TC', sans-serif; }
        .pip-count { color: #ff0000; font-size: 2em; font-weight: bold; }
        #loading { color: #f39c12; font-weight: bold; }
    </style>
</head>
<body>

<div class="container">
    <h1>基於 OpenCV.js 的即時骰子辨識</h1>
    <p id="loading">正在載入影像處理庫 (OpenCV.js)...</p>
    
    <div class="canvas-container">
        <video id="videoInput" width="640" height="480" hidden></video>
        <canvas id="canvasOutput" width="640" height="480"></canvas>
    </div>

    <div class="status-panel">
        <h3>總點數：<span id="pipTotal" class="pip-count">0</span></h3>
        <p>請將骰子放在黃色框線內</p>
        <button id="startBtn" disabled onclick="startCamera()">啟動攝像頭</button>
    </div>
</div>

<script async src="https://docs.opencv.org/4.x/opencv.js" onload="onOpenCvReady();"></script>

<script>
let video = document.getElementById('videoInput');
let canvasOutput = document.getElementById('canvasOutput');
let ctx = canvasOutput.getContext('2d');

// 參數設定 (同步自你的 final.py)
const ROI_SIZE = 300;
const MIN_DICE_AREA = 400;
const MAX_DICE_AREA = 6000;
const MIN_PIP_AREA = 10;
const MAX_PIP_AREA = 300;
const CIRCULARITY_THRESHOLD = 0.45;

function onOpenCvReady() {
    document.getElementById('loading').innerText = 'OpenCV.js 已就緒';
    document.getElementById('startBtn').disabled = false;
}

function startCamera() {
    navigator.mediaDevices.getUserMedia({ video: { facingMode: "environment" }, audio: false })
        .then(function(stream) {
            video.srcObject = stream;
            video.play();
            processVideo();
        })
        .catch(function(err) {
            console.error("攝像頭啟動失敗: " + err);
        });
}

function processVideo() {
    let src = new cv.Mat(video.height, video.width, cv.CV_8UC4);
    let cap = new cv.VideoCapture(video);

    function process() {
        try {
            cap.read(src);
            let frame = src.clone();
            let totalPips = 0;

            // 1. 計算 ROI
            let h = frame.rows;
            let w = frame.cols;
            let cy = Math.floor(h / 2);
            let cx = Math.floor(w / 2);
            let halfSize = ROI_SIZE / 2;
            let x1 = Math.max(0, cx - halfSize);
            let y1 = Math.max(0, cy - halfSize);

            let rect = new cv.Rect(x1, y1, ROI_SIZE, ROI_SIZE);
            let roi = frame.roi(rect);

            // 2. 預處理 (Gray -> Blur -> Adaptive Threshold)
            let gray = new cv.Mat();
            cv.cvtColor(roi, gray, cv.COLOR_RGBA2GRAY);
            let blurred = new cv.Mat();
            cv.GaussianBlur(gray, blurred, new cv.Size(5, 5), 0);
            let thresh = new cv.Mat();
            cv.adaptiveThreshold(blurred, thresh, 255, cv.ADAPTIVE_THRESH_GAUSSIAN_C, cv.THRESH_BINARY_INV, 35, 5);

            // 3. 找輪廓
            let contours = new cv.MatVector();
            let hierarchy = new cv.Mat();
            cv.findContours(thresh, contours, hierarchy, cv.RETR_TREE, cv.CHAIN_APPROX_SIMPLE);

            if (hierarchy.size() > 0) {
                for (let i = 0; i < contours.size(); ++i) {
                    let cnt = contours.get(i);
                    let area = cv.contourArea(cnt);

                    // 判斷骰子本體
                    if (area > MIN_DICE_AREA && area < MAX_DICE_AREA) {
                        // 取得階層資訊 [Next, Previous, First_Child, Parent]
                        let hInfo = hierarchy.intPtr(0, i);
                        let firstChildIdx = hInfo[2];

                        if (firstChildIdx !== -1) {
                            let pipCount = 0;
                            let childIdx = firstChildIdx;

                            while (childIdx !== -1) {
                                let childCnt = contours.get(childIdx);
                                let childArea = cv.contourArea(childCnt);

                                if (childArea > MIN_PIP_AREA && childArea < MAX_PIP_AREA) {
                                    let perimeter = cv.arcLength(childCnt, true);
                                    let circularity = (4 * Math.PI * childArea) / (perimeter * perimeter);

                                    if (circularity > CIRCULARITY_THRESHOLD) {
                                        pipCount++;
                                        // 畫點數 (綠色)
                                        let color = new cv.Scalar(0, 255, 0, 255);
                                        cv.drawContours(roi, contours, childIdx, color, -1);
                                    }
                                }
                                childIdx = hierarchy.intPtr(0, childIdx)[0]; // Next sibling
                            }

                            if (pipCount >= 1 && pipCount <= 6) {
                                totalPips += pipCount;
                                let boundRect = cv.boundingRect(cnt);
                                let colorBlue = new cv.Scalar(255, 0, 0, 255);
                                cv.rectangle(roi, new cv.Point(boundRect.x, boundRect.y), 
                                             new cv.Point(boundRect.x + boundRect.width, boundRect.y + boundRect.height), 
                                             colorBlue, 2);
                            }
                        }
                    }
                }
            }

            // 更新 UI
            document.getElementById('pipTotal').innerText = totalPips;

            // 畫出 ROI 黃色框
            cv.rectangle(frame, new cv.Point(x1, y1), new cv.Point(x1 + ROI_SIZE, y1 + ROI_SIZE), new cv.Scalar(255, 255, 0, 255), 2);

            // 顯示結果
            cv.imshow('canvasOutput', frame);

            // 釋放記憶體
            gray.delete(); blurred.delete(); thresh.delete(); 
            contours.delete(); hierarchy.delete(); roi.delete(); frame.delete();

            requestAnimationFrame(process);
        } catch (err) {
            console.error(err);
        }
    }
    process();
}
</script>

</body>
</html>
