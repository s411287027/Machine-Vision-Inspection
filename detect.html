<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>即時骰子辨識系統 - Web 版</title>
    <link rel="stylesheet" href="style.css">
    <style>
        .container { text-align: center; padding: 20px; }
        .canvas-container { position: relative; display: inline-block; }
        #canvasOutput { border: 2px solid #333; border-radius: 8px; max-width: 100%; }
        .status-panel { margin-top: 15px; font-family: 'Noto Sans TC', sans-serif; }
        .pip-count { color: #ff0000; font-size: 2em; font-weight: bold; }
        #loading { color: #f39c12; font-weight: bold; }
    </style>
</head>
<body>

<div class="container">
    <h1>基於 OpenCV.js 的即時骰子辨識</h1>
    <p id="loading">正在載入影像處理庫 (OpenCV.js)...</p>
    
    <div class="canvas-container">
        <video id="videoInput" width="640" height="480" hidden></video>
        <canvas id="canvasOutput" width="640" height="480"></canvas>
    </div>

    <div class="status-panel">
        <h3>總點數：<span id="pipTotal" class="pip-count">0</span></h3>
        <p>請將骰子放在黃色框線內</p>
        <button id="startBtn" disabled onclick="startCamera()">啟動攝像頭</button>
    </div>
</div>

<script async src="https://docs.opencv.org/4.x/opencv.js" onload="onOpenCvReady();"></script>

<script>
let video = document.getElementById('videoInput');
let canvasOutput = document.getElementById('canvasOutput');
let ctx = canvasOutput.getContext('2d');

// 參數設定 (同步自你的 final.py)
const ROI_SIZE = 300;
const MIN_DICE_AREA = 400;
const MAX_DICE_AREA = 6000;
const MIN_PIP_AREA = 10;
const MAX_PIP_AREA = 300;
const CIRCULARITY_THRESHOLD = 0.45;

function onOpenCvReady() {
    document.getElementById('loading').innerText = 'OpenCV.js 已就緒';
    document.getElementById('startBtn').disabled = false;
}

function startCamera() {
    navigator.mediaDevices.getUserMedia({ video: { facingMode: "environment" }, audio: false })
        .then(function(stream) {
            video.srcObject = stream;
            video.play();
            processVideo();
        })
        .catch(function(err) {
            console.error("攝像頭啟動失敗: " + err);
        });
}

function processVideo() {
    // 自動獲取鏡頭實際解析度
    let width = video.videoWidth;
    let height = video.videoHeight;
    
    if (width === 0 || height === 0) {
        setTimeout(processVideo, 100); // 鏡頭還沒準備好就等一下
        return;
    }

    let src = new cv.Mat(height, width, cv.CV_8UC4);
    let cap = new cv.VideoCapture(video);

    function process() {
        try {
            cap.read(src);
            let frame = src.clone();
            
            // --- 步驟 1: ROI 裁切 ---
            let x1 = Math.floor(width / 2 - ROI_SIZE / 2);
            let y1 = Math.floor(height / 2 - ROI_SIZE / 2);
            let rect = new cv.Rect(x1, y1, ROI_SIZE, ROI_SIZE);
            let roi = frame.roi(rect);

            // --- 步驟 2: 影像處理 (簡化流程確保穩定) ---
            let gray = new cv.Mat();
            let thresh = new cv.Mat();
            cv.cvtColor(roi, gray, cv.COLOR_RGBA2GRAY);
            // 提高自適應二值化的 C 值 (最後一個參數)，減少環境雜訊
            cv.adaptiveThreshold(gray, thresh, 255, cv.ADAPTIVE_THRESH_GAUSSIAN_C, cv.THRESH_BINARY_INV, 21, 10);

            // --- 步驟 3: 尋找輪廓 ---
            let contours = new cv.MatVector();
            let hierarchy = new cv.Mat();
            cv.findContours(thresh, contours, hierarchy, cv.RETR_TREE, cv.CHAIN_APPROX_SIMPLE);

            let totalPips = 0;

            for (let i = 0; i < contours.size(); ++i) {
                let cnt = contours.get(i);
                let area = cv.contourArea(cnt);

                // 寬鬆判斷：只要面積符合點數大小且圓度夠，就計入
                if (area > MIN_PIP_AREA && area < MAX_PIP_AREA) {
                    let perimeter = cv.arcLength(cnt, true);
                    let circularity = (4 * Math.PI * area) / (perimeter * perimeter);
                    
                    if (circularity > 0.3) { // 稍微降低圓度門檻以應對斜角
                        totalPips++;
                        // 在 ROI 上畫出綠色點標示
                        let color = new cv.Scalar(0, 255, 0, 255);
                        cv.drawContours(roi, contours, i, color, -1);
                    }
                }
            }

            // --- 步驟 4: 顯示結果 ---
            document.getElementById('pipTotal').innerText = totalPips;
            
            // 畫黃色引導框
            let yellow = new cv.Scalar(255, 255, 0, 255);
            cv.rectangle(frame, new cv.Point(x1, y1), new cv.Point(x1 + ROI_SIZE, y1 + ROI_SIZE), yellow, 2);

            cv.imshow('canvasOutput', frame); // 這裡改顯示 frame 看到完整畫面
            // 若要除錯，可改為 cv.imshow('canvasOutput', thresh); 看看二值化有沒有東西

            // --- 步驟 5: 徹底釋放記憶體 ---
            gray.delete(); thresh.delete(); contours.delete(); 
            hierarchy.delete(); roi.delete(); frame.delete();

            requestAnimationFrame(process);
        } catch (err) {
            console.error("辨識程式發生錯誤: ", err);
            // 發生錯誤時釋放 src 以免記憶體洩漏
            src.delete(); 
        }
    }
    process();
}
</script>

</body>
</html>
